name: Hexnode CI/CD Pipeline

on:
  push:
  pull_request:

jobs:
  frontend:
    name: Frontend quality check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/ragline-ui

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Prepare Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/ragline-ui/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Check frontend code quality
        run: npm run lint

      - name: Build frontend for production
        run: npm run build

  backend-docker:
    name: Backend Docker build and push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-doc-copilot:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-doc-copilot:latest

  deploy-backend:
    name: Deploy backend to Cloud Run
    runs-on: ubuntu-latest
    needs: backend-docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout project code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy backend image to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/ai-doc-copilot:${{ github.sha }}

      - name: Show deployed backend URL
        run: echo "${{ steps.deploy.outputs.url }}"
